<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <title>Roast Toast Coast Cafe</title>
   <style>
       @font-face {
           font-family: 'Bogart';
           src: url('https://fonts.cdnfonts.com/s/24702/Bogart-Light.woff') format('woff');
           font-weight: normal;
           font-style: normal;
           font-display: swap;
       }

       body {
           background-color: black;
           font-family: 'Bogart', sans-serif;
           margin: 0;
           padding: 0;
           display: grid;
           grid-template-columns: 1fr 1fr; /* Two columns of equal width */
           height: 100vh; /* Full height */
       }

       .content {
           display: flex;
           flex-direction: column;
           justify-content: center;
           align-items: center;
           padding: 20px;
       }

       .image-container {
           background-image: url('https://images.unsplash.com/photo-1514066558159-fc8c737ef259?q=80&w=2574&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8MHx8fA%3D%3D');
           background-size: cover;
           background-position: center;
           height: 100%;
       }

       .header-container {
           background-color: rgba(255, 255, 255, 0.1); /* Semi-transparent white */
           border: 1px solid rgba(255, 255, 255, 0.3); /* Light border for a sleek look */
           border-radius: 15px;
           padding: 20px;
           margin-bottom: 20px;
           width: 90%;
           box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.7); /* Soft shadow */
           text-align: center;
       }

       .header-container h1 {
           color: #FFCC00; /* Bright gold for contrast */
           font-size: 3em;
           margin-bottom: 10px;
           text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.8); /* Subtle shadow for depth */
           line-height: 1.2; /* Adjust spacing between lines */
       }

       .header-container p {
           font-size: 1.3em;
           color: #FFFFFF; /* White for good readability */
           margin: 0;
           text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.6); /* Subtle shadow for depth */
       }

       .menu-section {
           background-color: #000000;
           color: #FFFFFF;
           padding: 10px;
           margin: 20px 0 20px 10%; /* Align section to the left */
           width: 60%;
           border-radius: 10px;
           box-shadow: 0px 4px 10px rgba(189, 180, 180, 0.7);
           text-align: center;
       }

       .menu-section h2 {
           color: #FFCC00;
           font-size: 2em;
           margin-bottom: 20px;
           cursor: pointer;
       }

       .menu-items {
           list-style-type: none;
           padding: 0;
           display: none; /* Hidden by default */
       }

       .menu-items li {
           background-color: #222222;
           color: #F7F7F7;
           padding: 10px;
           border-radius: 5px;
           margin: 10px 0;
           text-align: center;
           font-size: 1.1em;
           box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.5);
       }

       .menu-toggle:hover {
           color: #FF9933;
           cursor: pointer;
       }
   </style>
</head>
<body>
   <div class="content">
       <div class="header-container">
           <h1>Welcome to the<br>Roast Toast Coast Cafe!</h1>
           <p>Where flavor meets the shore!</p>
       </div>

       <section class="menu-section">
           <h2 class="menu-toggle"
               role="button"
               tabindex="0"
               aria-expanded="false">Our Menu</h2>
           <ul class="menu-items">
               <li>Breezy Brews</li>
               <li>Toasty Delights</li>
               <li>Coastal Bites</li>
               <li>Sunset Sips</li>
           </ul>
       </section>
   </div>

   <div class="image-container"></div>

   <script>
       function toggleMenuItems() {
           const menuItems = document.querySelector('.menu-items');
           const toggle = document.querySelector('.menu-toggle');
           const isExpanded = toggle.getAttribute('aria-expanded') === 'true';
           menuItems.style.display = isExpanded ? 'none' : 'block';
           toggle.setAttribute('aria-expanded', String(!isExpanded));
       }

       document.querySelector('.menu-toggle').addEventListener('click', toggleMenuItems);
       document.querySelector('.menu-toggle').addEventListener('keydown', function (e) {
           if (e.key === 'Enter' || e.key === ' ') {
               e.preventDefault();
               toggleMenuItems();
           }
       });
   </script>
</body>
</html>
